<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html" xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>Registrera användare</h:head>
    <h:body>

        <h:form id="userForm">
            Username: <p:inputText id="username" value="#{appUserBean.username}" required="true"/>
            <h:message for="username"/><br/>
            Password: <h:inputSecret id="password" value="#{appUserBean.password}"
                                     styleClass="ui-inputfield ui-inputtext ui-widget ui-state-default ui-corner-all"
                                     required="true"/>
            <h:message for="password"/><br/>
            <p:commandButton value="Save" action="#{appUserBean.saveUser()}" update="@form userList"/>
        </h:form>

        <h:form>
            <p:commandButton value="To ChatApp" action="login?faces-redirect=true"/>
        </h:form>

        <h:panelGroup id="userList">
            <ui:repeat value="#{appUserBean.allUsers}" var="user">
                <p>#{user.id}, #{user.username}</p>
            </ui:repeat>
        </h:panelGroup>
    </h:body>
</f:view>
</html>
